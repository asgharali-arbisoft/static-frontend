version: 0.2

env:
  shell: bash

phases:
  install:
    commands:
      - set -euo pipefail
      - command -v aws
      - command -v bash
      - |
        if [[ "${PIPELINE_PHASE}" == "deploy" ]]; then
          case "${PACKAGE_MANAGER}" in
            npm)
              npm ci
              ;;
            pnpm)
              corepack enable
              pnpm install --frozen-lockfile
              ;;
            yarn)
              corepack enable
              yarn install --frozen-lockfile
              ;;
            *)
              echo "Unsupported PACKAGE_MANAGER=${PACKAGE_MANAGER}" >&2
              exit 1
              ;;
          esac
        fi

  pre_build:
    commands:
      - set -euo pipefail
      - |
        required_vars=(
          AWS_REGION
          S3_BUCKET_NAME
          CLOUDFRONT_DISTRIBUTION_ID
          BUILD_OUTPUT_DIR
          INVALIDATION_PATHS
          STATIC_ASSET_CACHE_CONTROL
          HTML_CACHE_CONTROL
          METADATA_CACHE_CONTROL
        )

        for var_name in "${required_vars[@]}"; do
          if [[ -z "${!var_name:-}" ]]; then
            echo "FATAL: ${var_name} is required." >&2
            exit 1
          fi
        done

        if [[ "${PIPELINE_PHASE}" == "deploy" && "${GITLEAKS_SCAN_ENABLED}" == "true" ]]; then
          command -v gitleaks || {
            echo "FATAL: GITLEAKS_SCAN_ENABLED=true but gitleaks is not installed in the CodeBuild image." >&2
            exit 1
          }
          gitleaks detect --source . --no-git --redact --exit-code 1
        fi

        if [[ "${PIPELINE_PHASE}" == "deploy" && -n "${LINT_COMMAND:-}" ]]; then
          bash -c "${LINT_COMMAND}"
        fi

        if [[ "${PIPELINE_PHASE}" == "deploy" && -n "${TEST_COMMAND:-}" ]]; then
          bash -c "${TEST_COMMAND}"
        fi

        if [[ "${PIPELINE_PHASE}" == "deploy" && "${DEPENDENCY_SCAN_ENABLED}" == "true" ]]; then
          case "${PACKAGE_MANAGER}" in
            npm)
              if [[ "${FAIL_ON_HIGH_CRITICAL}" == "true" ]]; then
                npm audit --audit-level=high
              else
                npm audit || true
              fi
              ;;
            pnpm)
              if [[ "${FAIL_ON_HIGH_CRITICAL}" == "true" ]]; then
                pnpm audit --audit-level high
              else
                pnpm audit || true
              fi
              ;;
            yarn)
              yarn npm audit --severity high || [[ "${FAIL_ON_HIGH_CRITICAL}" != "true" ]]
              ;;
          esac
        fi

  build:
    commands:
      - set -euo pipefail
      - |
        destination="s3://${S3_BUCKET_NAME}"
        if [[ -n "${DEPLOY_PREFIX:-}" ]]; then
          destination="${destination}/${DEPLOY_PREFIX%/}"
        fi

        if [[ "${PIPELINE_PHASE}" == "deploy" ]]; then
          bash -c "${BUILD_COMMAND}"

          if [[ ! -d "${BUILD_OUTPUT_DIR}" ]]; then
            echo "FATAL: build output directory not found: ${BUILD_OUTPUT_DIR}" >&2
            exit 1
          fi

          delete_args=()
          if [[ "${S3_SYNC_DELETE}" == "true" ]]; then
            delete_args=(--delete)
          fi

          aws s3 sync "${BUILD_OUTPUT_DIR}/" "${destination}/" \
            "${delete_args[@]}" \
            --exclude "index.html" \
            --exclude "manifest.json" \
            --exclude "asset-manifest.json" \
            --exclude "service-worker.js" \
            --cache-control "${STATIC_ASSET_CACHE_CONTROL}"

          for metadata_file in manifest.json asset-manifest.json service-worker.js; do
            if [[ -f "${BUILD_OUTPUT_DIR}/${metadata_file}" ]]; then
              aws s3 cp "${BUILD_OUTPUT_DIR}/${metadata_file}" "${destination}/${metadata_file}" \
                --cache-control "${METADATA_CACHE_CONTROL}"
            fi
          done

          if [[ -f "${BUILD_OUTPUT_DIR}/index.html" ]]; then
            aws s3 cp "${BUILD_OUTPUT_DIR}/index.html" "${destination}/index.html" \
              --cache-control "${HTML_CACHE_CONTROL}"
          else
            echo "FATAL: index.html was not found in ${BUILD_OUTPUT_DIR}." >&2
            exit 1
          fi
        fi

        if [[ "${PIPELINE_PHASE}" == "invalidate" ]]; then
          read -r -a paths <<< "${INVALIDATION_PATHS}"
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "${paths[@]}"
        fi
