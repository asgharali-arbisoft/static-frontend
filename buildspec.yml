# Admin CloudFront/S3 frontend CI/CD buildspec.
# Save this as admin.frontend.buildspec.yml in the admin frontend repository.
version: 0.2

env:
  shell: bash
  variables:
    # true = require gitleaks to be installed and fail on detected secrets.
    # false = skip the gitleaks scan.
    GITLEAKS_SCAN_ENABLED: "false"
    # true = run package-manager audit checks.
    # false = skip dependency audit checks.
    DEPENDENCY_SCAN_ENABLED: "false"
    # true = fail dependency audit on HIGH/CRITICAL findings when supported.
    # false = report dependency findings without failing the build.
    FAIL_ON_HIGH_CRITICAL: "false"

phases:
  install:
    commands:
      - set -euo pipefail
      - echo "Preparing admin frontend CloudFront/S3 CI/CD phase ${PIPELINE_PHASE}"
      - command -v aws
      - command -v bash
      - |
        if [[ "${PIPELINE_PHASE}" == "deploy" && -f package.json ]]; then
          case "${PACKAGE_MANAGER}" in
            npm)
              if [[ -f package-lock.json ]]; then
                npm ci
              else
                npm install
              fi
              ;;
            pnpm)
              corepack enable
              pnpm install --frozen-lockfile
              ;;
            yarn)
              corepack enable
              yarn install --frozen-lockfile
              ;;
            *)
              echo "FATAL: Unsupported PACKAGE_MANAGER=${PACKAGE_MANAGER}" >&2
              exit 1
              ;;
          esac
        fi

  pre_build:
    commands:
      - |
        set -euo pipefail

        require_env() {
          local name="$1"
          if [[ -z "${!name:-}" ]]; then
            echo "FATAL: Required environment variable '${name}' is not set." >&2
            exit 1
          fi
        }

        require_env AWS_REGION
        require_env S3_BUCKET_NAME
        require_env CLOUDFRONT_DISTRIBUTION_ID
        require_env BUILD_OUTPUT_DIR
        require_env INVALIDATION_PATHS
        require_env STATIC_ASSET_CACHE_CONTROL
        require_env HTML_CACHE_CONTROL
        require_env METADATA_CACHE_CONTROL

        echo "INFO: S3 bucket: ${S3_BUCKET_NAME}"
        echo "INFO: CloudFront distribution: ${CLOUDFRONT_DISTRIBUTION_ID}"
        echo "INFO: Build output directory: ${BUILD_OUTPUT_DIR}"
        echo "INFO: GITLEAKS_SCAN_ENABLED=${GITLEAKS_SCAN_ENABLED:-false}"
        echo "INFO: DEPENDENCY_SCAN_ENABLED=${DEPENDENCY_SCAN_ENABLED:-false}"
        echo "INFO: FAIL_ON_HIGH_CRITICAL=${FAIL_ON_HIGH_CRITICAL:-false}"

        if [[ "${PIPELINE_PHASE}" == "deploy" && "${GITLEAKS_SCAN_ENABLED:-false}" == "true" ]]; then
          command -v gitleaks || {
            echo "FATAL: GITLEAKS_SCAN_ENABLED=true but gitleaks is not installed in the CodeBuild image." >&2
            exit 1
          }
          echo "INFO: Running Gitleaks secret scan"
          gitleaks detect --source . --no-git --redact --exit-code 1
        fi

        if [[ "${PIPELINE_PHASE}" == "deploy" && -n "${LINT_COMMAND:-}" ]]; then
          echo "INFO: Running lint command"
          bash -c "${LINT_COMMAND}"
        fi

        if [[ "${PIPELINE_PHASE}" == "deploy" && -n "${TEST_COMMAND:-}" ]]; then
          echo "INFO: Running test command"
          bash -c "${TEST_COMMAND}"
        fi

        if [[ "${PIPELINE_PHASE}" == "deploy" && "${DEPENDENCY_SCAN_ENABLED:-false}" == "true" && -f package.json ]]; then
          echo "INFO: Running dependency audit"
          case "${PACKAGE_MANAGER}" in
            npm)
              if [[ "${FAIL_ON_HIGH_CRITICAL:-false}" == "true" ]]; then
                npm audit --audit-level=high
              else
                npm audit || true
              fi
              ;;
            pnpm)
              if [[ "${FAIL_ON_HIGH_CRITICAL:-false}" == "true" ]]; then
                pnpm audit --audit-level high
              else
                pnpm audit || true
              fi
              ;;
            yarn)
              yarn npm audit --severity high || [[ "${FAIL_ON_HIGH_CRITICAL:-false}" != "true" ]]
              ;;
          esac
        fi

  build:
    commands:
      - |
        set -euo pipefail

        destination="s3://${S3_BUCKET_NAME}"
        if [[ -n "${DEPLOY_PREFIX:-}" ]]; then
          destination="${destination}/${DEPLOY_PREFIX%/}"
        fi

        if [[ "${PIPELINE_PHASE}" == "deploy" ]]; then
          if [[ -f package.json ]]; then
            echo "INFO: Running build command: ${BUILD_COMMAND}"
            bash -c "${BUILD_COMMAND}"
          else
            echo "INFO: package.json not found; packaging static repository contents into ${BUILD_OUTPUT_DIR}"
            rm -rf "${BUILD_OUTPUT_DIR}"
            mkdir -p "${BUILD_OUTPUT_DIR}"
            find . \
              -mindepth 1 \
              -maxdepth 1 \
              ! -name ".git" \
              ! -name "${BUILD_OUTPUT_DIR}" \
              ! -name "admin.frontend.buildspec.yml" \
              -exec cp -R {} "${BUILD_OUTPUT_DIR}/" \;
          fi

          if [[ ! -d "${BUILD_OUTPUT_DIR}" ]]; then
            echo "FATAL: Build output directory not found: ${BUILD_OUTPUT_DIR}" >&2
            exit 1
          fi

          delete_args=()
          if [[ "${S3_SYNC_DELETE}" == "true" ]]; then
            delete_args=(--delete)
          fi

          echo "INFO: Syncing static assets to ${destination}"
          aws s3 sync "${BUILD_OUTPUT_DIR}/" "${destination}/" \
            "${delete_args[@]}" \
            --exclude "index.html" \
            --exclude "manifest.json" \
            --exclude "asset-manifest.json" \
            --exclude "service-worker.js" \
            --cache-control "${STATIC_ASSET_CACHE_CONTROL}"

          for metadata_file in manifest.json asset-manifest.json service-worker.js; do
            if [[ -f "${BUILD_OUTPUT_DIR}/${metadata_file}" ]]; then
              aws s3 cp "${BUILD_OUTPUT_DIR}/${metadata_file}" "${destination}/${metadata_file}" \
                --cache-control "${METADATA_CACHE_CONTROL}"
            fi
          done

          if [[ -f "${BUILD_OUTPUT_DIR}/index.html" ]]; then
            aws s3 cp "${BUILD_OUTPUT_DIR}/index.html" "${destination}/index.html" \
              --cache-control "${HTML_CACHE_CONTROL}"
          else
            echo "FATAL: index.html was not found in ${BUILD_OUTPUT_DIR}." >&2
            exit 1
          fi
        fi

        if [[ "${PIPELINE_PHASE}" == "invalidate" ]]; then
          read -r -a paths <<< "${INVALIDATION_PATHS}"
          echo "INFO: Creating CloudFront invalidation for ${paths[*]}"
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "${paths[@]}"
        fi
